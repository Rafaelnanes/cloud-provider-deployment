apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: istio-passthrough
  namespace: { { .Values.nginxNamespace } }
  annotations:
    # Tells NGINX the backend speaks plain HTTP (not HTTPS) — matches Istio IngressGateway port 80
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # Forwards the X-API-KEY header upstream; NGINX strips unknown headers by default
    nginx.ingress.kubernetes.io/proxy-pass-headers: "X-API-KEY"
spec:
  # Targets the NGINX Ingress Controller specifically (cluster may have multiple ingress controllers)
  ingressClassName: nginx
  rules:
    - http:
        paths:
          { { - range .Values.paths } }
          -  path: { { . } }
            # Prefix = matches this path and anything under it
            @2: Prefix
             backend:
               service:
                 # The ExternalName service that bridges to istio-ingressgateway in istio-system
                 name: istio-ingressgateway-proxy
                 port:
                   number: 80
          { { - end } }
