replicaCount: 1

image:
  name: users
  tag: jvm
  pullPolicy: Never

service:
  type: ClusterIP
  port: 8080

readinessProbe:
  path: /users
  initialDelaySeconds: 5
  periodSeconds: 5

domainPrefix: rbn
apiKey: changeme

config:
  envInfo: default
  serverPort: 8080
  productsUrl: http://products-dev:8080
  productsApiKey: changeme

  logLevelRoot: INFO
  logLevelApp: DEBUG

security:
  networkPolicy: false
  rbacIam: false
