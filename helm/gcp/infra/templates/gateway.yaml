apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: {{ .Values.gateway.class }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.gateway.name }}-routes
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  rules:
    {{- range .Values.gateway.routes }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .pathPrefix }}
          headers:
            - name: x-api-key
              value: {{ required "gateway.apiKey is required" $.Values.gateway.apiKey }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ .rewriteTo }}
      backendRefs:
        - name: {{ .backendService }}
          port: {{ .backendPort }}
    {{- end }}
