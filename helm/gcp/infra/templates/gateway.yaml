apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: {{ .Values.gateway.class }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same # only HTTPRoutes in the same namespace as this Gateway can attach to it
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.gateway.name }}-routes
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }} # attaches this route to the Gateway defined above
  rules:
    {{- range .Values.gateway.routes }} # one rule per entry in values.gateway.routes
    - matches:
        - path:
            type: PathPrefix
            value: {{ .pathPrefix }} # incoming path that triggers this rule (e.g. /rbn/products)
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ .rewriteTo }} # strips the public prefix before forwarding (e.g. /rbn/products → /products)
      backendRefs:
        - name: {{ .backendService }} # Kubernetes Service name to forward traffic to
          port: {{ .backendPort }}    # Service port (cluster-internal)
    {{- end }}