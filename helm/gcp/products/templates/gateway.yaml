apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: {{ .Release.Name }}-health-check
  namespace: {{ .Release.Namespace }}
spec:
  default: # default health check settings applied to all backends unless overridden
    checkIntervalSec: 40 # how often (seconds) GCP sends a health check probe
    timeoutSec: 10 # seconds to wait for a response before marking the probe as failed
    healthyThreshold: 1 # consecutive successes required to mark a backend as healthy
    unhealthyThreshold: 2 # consecutive failures required to mark a backend as unhealthy
    config:
      type: HTTP # protocol used for the health check probe
      httpHealthCheck:
        requestPath: {{ .Values.readinessProbe.path }} # HTTP path the probe hits (e.g. /actuator/health)
        port: {{ .Values.config.serverPort }} # port on the pod the probe connects to
  targetRef:
    group: ""
    kind: Service
    name: {{ .Release.Name }}
