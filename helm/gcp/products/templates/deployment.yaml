apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.config.serverPort }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: {{ .Values.config.serverPort }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: {{ .Values.config.serverPort }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "10Mi"
            limits:              # limits == requests → Guaranteed QoS class; pod won't be throttled or evicted unexpectedly
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "10Mi"
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.io.tmpdir=/tmp/jvm" # redirects JVM tmp writes to the emptyDir volume (avoids read-only FS errors)
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config # injects all ConfigMap keys as environment variables
          volumeMounts:
            - name: jvm-tmp
              mountPath: /tmp/jvm # writable scratch space for the JVM (temp files, class data sharing)
      volumes:
        - name: jvm-tmp
          emptyDir: {} # ephemeral in-memory volume; destroyed when the pod is removed