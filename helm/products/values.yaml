replicaCount: 1

image:
  name: products
  tag: jvm
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 10
  periodSeconds: 15

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 10
  periodSeconds: 10

config:
  envInfo: default
  serverPort: 8080
  logLevelRoot: INFO
  logLevelApp: DEBUG

security:
  networkPolicy: false
  rbacIam: false