replicaCount: 1

image:
  name: products
  tag: jvm
  pullPolicy: Never

service:
  type: ClusterIP
  port: 8080

readinessProbe:
  path: /products
  initialDelaySeconds: 5
  periodSeconds: 5

domainPrefix: rbn
apiKey: changeme

config:
  envInfo: default
  serverPort: 8080
  logLevelRoot: INFO
  logLevelApp: DEBUG