spring:
  application:
    name: products

service.envInfo: ${ENV_INFO}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.product: ${LOG_LEVEL_APP:DEBUG}

server.port: ${SERVER_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true